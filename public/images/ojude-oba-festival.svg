  <text x="400" y="243" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#C9A227" text-anchor="middle">Ojude Oba Festival</text>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.85">Annual Celebration of Culture &amp; Heritage</text>
