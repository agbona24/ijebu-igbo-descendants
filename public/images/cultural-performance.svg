<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="perfBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="60%" stop-color="#0B3D91"/>
      <stop offset="100%" stop-color="#072360"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2800"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#perfBg)"/>
  <!-- Stage -->
  <ellipse cx="400" cy="520" rx="350" ry="80" fill="url(#stageGrad)"/>
  <rect x="50" y="440" width="700" height="80" fill="#2c1a00" rx="4"/>
  <!-- Stage lights -->
  <line x1="200" y1="0" x2="280" y2="200" stroke="#FFE55C" stroke-width="40" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#FFE55C" stroke-width="50" opacity="0.12"/>
  <line x1="600" y1="0" x2="520" y2="200" stroke="#FFE55C" stroke-width="40" opacity="0.1"/>
  <line x1="200" y1="0" x2="280" y2="200" stroke="#FFE55C" stroke-width="8" opacity="0.4"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#FFE55C" stroke-width="10" opacity="0.4"/>
  <line x1="600" y1="0" x2="520" y2="200" stroke="#FFE55C" stroke-width="8" opacity="0.4"/>
  <!-- Light fixtures -->
  <rect x="160" y="20" width="25" height="40" rx="4" fill="#333" stroke="#C9A227" stroke-width="1"/>
  <rect x="375" y="10" width="30" height="45" rx="4" fill="#333" stroke="#C9A227" stroke-width="1"/>
  <rect x="615" y="20" width="25" height="40" rx="4" fill="#333" stroke="#C9A227" stroke-width="1"/>
  <!-- Performer 1 - traditional dance -->
  <ellipse cx="280" cy="365" rx="25" ry="28" fill="#2c1a00"/>
  <rect x="262" y="392" width="36" height="50" fill="#C9A227" rx="2"/>
  <!-- Raised arms -->
  <line x1="262" y1="405" x2="225" y2="370" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <line x1="298" y1="405" x2="335" y2="360" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <!-- Legs in dance motion -->
  <line x1="272" y1="442" x2="255" y2="490" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <line x1="294" y1="442" x2="320" y2="488" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <!-- Traditional costume details -->
  <ellipse cx="280" cy="408" rx="20" ry="8" fill="#e8c040" opacity="0.6"/>
  <!-- Performer 2 - center, singing/leading -->
  <ellipse cx="400" cy="340" rx="28" ry="32" fill="#3d2200"/>
  <rect x="378" y="371" width="44" height="70" fill="#0B3D91" rx="2"/>
  <line x1="378" y1="385" x2="338" y2="355" stroke="#3d2200" stroke-width="14" stroke-linecap="round"/>
  <line x1="422" y1="385" x2="462" y2="345" stroke="#3d2200" stroke-width="14" stroke-linecap="round"/>
  <line x1="388" y1="441" x2="375" y2="495" stroke="#3d2200" stroke-width="14" stroke-linecap="round"/>
  <line x1="412" y1="441" x2="428" y2="495" stroke="#3d2200" stroke-width="14" stroke-linecap="round"/>
  <!-- Crown/headgear -->
  <ellipse cx="400" cy="330" rx="30" ry="12" fill="#C9A227" opacity="0.8"/>
  <polygon points="380,330 385,308 390,330" fill="#C9A227" opacity="0.8"/>
  <polygon points="395,328 400,305 405,328" fill="#C9A227" opacity="0.8"/>
  <polygon points="410,330 415,308 420,330" fill="#C9A227" opacity="0.8"/>
  <!-- Performer 3 - traditional dance -->
  <ellipse cx="520" cy="370" rx="25" ry="28" fill="#2c1a00"/>
  <rect x="502" y="397" width="36" height="50" fill="#8B0000" rx="2"/>
  <line x1="502" y1="410" x2="462" y2="375" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <line x1="538" y1="410" x2="578" y2="370" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="447" x2="490" y2="495" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <line x1="534" y1="447" x2="555" y2="493" stroke="#2c1a00" stroke-width="12" stroke-linecap="round"/>
  <!-- Drummer at the side -->
  <ellipse cx="130" cy="400" rx="20" ry="22" fill="#3d2200"/>
  <rect x="115" y="420" width="30" height="40" fill="#5c3a1e"/>
  <ellipse cx="140" cy="450" rx="15" ry="25" fill="#3d1500" stroke="#C9A227" stroke-width="1.5"/>
  <!-- Audience silhouettes at bottom -->
  <g fill="#0a0a1a" opacity="0.5">
    <ellipse cx="80" cy="545" rx="15" ry="18"/>
    <ellipse cx="140" cy="540" rx="15" ry="18"/>
    <ellipse cx="660" cy="540" rx="15" ry="18"/>
    <ellipse cx="720" cy="545" rx="15" ry="18"/>
  </g>
  <!-- Decorative confetti/sparks -->
  <circle cx="320" cy="300" r="4" fill="#C9A227" opacity="0.9"/>
  <circle cx="480" cy="280" r="3" fill="#FFE55C" opacity="0.8"/>
  <circle cx="350" cy="250" r="4" fill="#C9A227" opacity="0.7"/>
  <circle cx="450" cy="260" r="3" fill="white" opacity="0.6"/>
  <!-- Caption -->
  <rect x="0" y="530" width="800" height="70" fill="#C9A227" opacity="0.9"/>
  <text x="400" y="564" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#0B3D91" text-anchor="middle">Cultural Performance</text>
  <text x="400" y="588" font-family="Arial, sans-serif" font-size="15" fill="#0B3D91" text-anchor="middle" opacity="0.85">Traditional Dance &amp; Music of Ijebu Igbo</text>
</svg>
