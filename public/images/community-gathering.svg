<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#c7d8f8"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c30"/>
      <stop offset="100%" stop-color="#2d5a1b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Ground -->
  <rect y="430" width="800" height="170" fill="url(#groundGrad)"/>
  <!-- Traditional Nigerian buildings -->
  <rect x="80" y="300" width="160" height="130" fill="#d4a574" rx="4"/>
  <polygon points="80,300 160,220 240,300" fill="#c4845a"/>
  <rect x="100" y="350" width="45" height="80" fill="#8B5E3C"/>
  <rect x="170" y="360" width="35" height="70" fill="#e8c99a" opacity="0.8"/>
  <!-- Second building -->
  <rect x="280" y="320" width="140" height="110" fill="#d4a574" rx="4"/>
  <polygon points="280,320 350,250 420,320" fill="#c4845a"/>
  <rect x="310" y="380" width="35" height="50" fill="#8B5E3C"/>
  <!-- Community gathering center -->
  <rect x="460" y="280" width="200" height="150" fill="#c09060" rx="6"/>
  <polygon points="460,280 560,190 660,280" fill="#a07040"/>
  <rect x="510" y="330" width="50" height="100" fill="#8B5E3C"/>
  <rect x="580" y="350" width="40" height="80" fill="#e8c99a" opacity="0.8"/>
  <!-- Trees -->
  <ellipse cx="50" cy="380" rx="45" ry="70" fill="#2d6b1a"/>
  <rect x="44" y="430" width="12" height="60" fill="#5c3a1e"/>
  <ellipse cx="750" cy="370" rx="50" ry="75" fill="#2d6b1a"/>
  <rect x="744" y="425" width="12" height="65" fill="#5c3a1e"/>
  <!-- People gathering -->
  <g opacity="0.85">
    <!-- Person 1 -->
    <ellipse cx="320" cy="415" rx="15" ry="18" fill="#5c3a1e"/>
    <rect x="313" y="432" width="14" height="30" fill="#C9A227"/>
    <!-- Person 2 -->
    <ellipse cx="360" cy="410" rx="15" ry="18" fill="#3d2200"/>
    <rect x="353" y="427" width="14" height="32" fill="#0B3D91"/>
    <!-- Person 3 -->
    <ellipse cx="400" cy="418" rx="15" ry="18" fill="#5c3a1e"/>
    <rect x="393" y="435" width="14" height="28" fill="#C9A227"/>
    <!-- Person 4 -->
    <ellipse cx="440" cy="412" rx="15" ry="18" fill="#3d2200"/>
    <rect x="433" y="429" width="14" height="32" fill="#1a56b0"/>
    <!-- Person 5 -->
    <ellipse cx="480" cy="415" rx="15" ry="18" fill="#5c3a1e"/>
    <rect x="473" y="432" width="14" height="30" fill="#C9A227"/>
  </g>
  <!-- Decorative pattern border -->
  <rect x="0" y="0" width="800" height="18" fill="#C9A227" opacity="0.7"/>
  <rect x="0" y="582" width="800" height="18" fill="#C9A227" opacity="0.7"/>
  <!-- Gold geometric pattern -->
  <g fill="#C9A227" opacity="0.3">
    <polygon points="0,0 36,0 0,36"/>
    <polygon points="800,0 764,0 800,36"/>
    <polygon points="0,600 36,600 0,564"/>
    <polygon points="800,600 764,600 800,564"/>
  </g>
  <!-- Caption -->
  <rect x="0" y="510" width="800" height="72" fill="#0B3D91" opacity="0.75"/>
  <text x="400" y="548" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">Community Gathering</text>
  <text x="400" y="572" font-family="Arial, sans-serif" font-size="16" fill="#C9A227" text-anchor="middle">Ijebu Igbo • Ogun State, Nigeria</text>
</svg>
