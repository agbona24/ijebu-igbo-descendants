<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="cultureBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="40%" stop-color="#3d1800"/>
      <stop offset="100%" stop-color="#5a2800"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#cultureBg)"/>
  <!-- Decorative Adire (traditional Nigerian fabric) pattern -->
  <g opacity="0.15" fill="none" stroke="#C9A227" stroke-width="1">
    <!-- Geometric pattern rows -->
    <rect x="0" y="0" width="40" height="40"/>
    <rect x="40" y="0" width="40" height="40"/>
    <rect x="80" y="0" width="40" height="40"/>
    <rect x="120" y="0" width="40" height="40"/>
    <rect x="160" y="0" width="40" height="40"/>
    <!-- Diamond pattern -->
    <polygon points="20,0 40,20 20,40 0,20"/>
    <polygon points="60,0 80,20 60,40 40,20"/>
    <polygon points="100,0 120,20 100,40 80,20"/>
    <polygon points="140,0 160,20 140,40 120,20"/>
    <polygon points="180,0 200,20 180,40 160,20"/>
    <polygon points="220,0 240,20 220,40 200,20"/>
    <polygon points="260,0 280,20 260,40 240,20"/>
    <polygon points="300,0 320,20 300,40 280,20"/>
    <polygon points="340,0 360,20 340,40 320,20"/>
    <polygon points="380,0 400,20 380,40 360,20"/>
    <polygon points="420,0 440,20 420,40 400,20"/>
    <polygon points="460,0 480,20 460,40 440,20"/>
    <polygon points="500,0 520,20 500,40 480,20"/>
    <polygon points="540,0 560,20 540,40 520,20"/>
    <polygon points="580,0 600,20 580,40 560,20"/>
    <polygon points="620,0 640,20 620,40 600,20"/>
    <polygon points="660,0 680,20 660,40 640,20"/>
    <polygon points="700,0 720,20 700,40 680,20"/>
    <polygon points="740,0 760,20 740,40 720,20"/>
    <polygon points="780,0 800,20 780,40 760,20"/>
  </g>
  <!-- Traditional Aso-oke fabric display (central decoration) -->
  <rect x="160" y="100" width="480" height="320" rx="8" fill="#8B4513" opacity="0.6"/>
  <!-- Fabric strips pattern -->
  <g opacity="0.85">
    <rect x="170" y="110" width="60" height="300" fill="#C9A227" opacity="0.9"/>
    <rect x="235" y="110" width="30" height="300" fill="#0B3D91" opacity="0.9"/>
    <rect x="270" y="110" width="60" height="300" fill="#8B0000" opacity="0.9"/>
    <rect x="335" y="110" width="30" height="300" fill="#C9A227" opacity="0.9"/>
    <rect x="370" y="110" width="60" height="300" fill="#0B3D91" opacity="0.9"/>
    <rect x="435" y="110" width="30" height="300" fill="#C9A227" opacity="0.9"/>
    <rect x="470" y="110" width="60" height="300" fill="#8B0000" opacity="0.9"/>
    <rect x="535" y="110" width="30" height="300" fill="#0B3D91" opacity="0.9"/>
    <rect x="570" y="110" width="60" height="300" fill="#C9A227" opacity="0.9"/>
    <!-- Horizontal bands (woven pattern) -->
    <rect x="160" y="190" width="480" height="25" fill="#1a1a1a" opacity="0.5"/>
    <rect x="160" y="230" width="480" height="15" fill="white" opacity="0.15"/>
    <rect x="160" y="300" width="480" height="25" fill="#1a1a1a" opacity="0.5"/>
    <rect x="160" y="340" width="480" height="15" fill="white" opacity="0.15"/>
  </g>
  <!-- Gold embroidery details -->
  <g fill="#C9A227" opacity="0.6">
    <polygon points="400,130 415,160 430,130 415,145"/>
    <polygon points="400,390 415,360 430,390 415,375"/>
    <polygon points="200,260 230,250 200,240 215,250"/>
    <polygon points="600,260 570,250 600,240 585,250"/>
  </g>
  <!-- Caption background -->
  <rect x="0" y="470" width="800" height="130" fill="#0B3D91" opacity="0.85"/>
  <text x="400" y="518" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Traditional Cultural Attire</text>
  <text x="400" y="548" font-family="Arial, sans-serif" font-size="17" fill="#C9A227" text-anchor="middle">Aso-oke &amp; Adire — Living Heritage of Ijebu Igbo</text>
  <text x="400" y="575" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7">Preserving our cultural identity across generations</text>
</svg>
