<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8a2a"/>
      <stop offset="100%" stop-color="#2d5a1b"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6b5335"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <!-- Sun -->
  <circle cx="680" cy="100" r="55" fill="#FFD700" opacity="0.7"/>
  <circle cx="680" cy="100" r="40" fill="#FFE55C" opacity="0.9"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="100" rx="90" ry="35" fill="white" opacity="0.85"/>
  <ellipse cx="260" cy="88" rx="70" ry="30" fill="white" opacity="0.85"/>
  <ellipse cx="140" cy="110" rx="55" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="500" cy="130" rx="75" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="560" cy="118" rx="60" ry="26" fill="white" opacity="0.8"/>
  <!-- Hills -->
  <ellipse cx="100" cy="350" rx="250" ry="180" fill="#3d7a1e" opacity="0.7"/>
  <ellipse cx="700" cy="370" rx="250" ry="180" fill="#3d7a1e" opacity="0.7"/>
  <ellipse cx="400" cy="380" rx="300" ry="200" fill="url(#hillGrad)" opacity="0.9"/>
  <!-- Ground -->
  <rect y="450" width="800" height="150" fill="#2d5a1b"/>
  <rect y="490" width="800" height="110" fill="#1a3a10"/>
  <!-- Winding road -->
  <path d="M 350 600 Q 360 500 380 430 Q 400 380 410 300 Q 420 250 430 200" stroke="url(#roadGrad)" stroke-width="30" fill="none" opacity="0.8"/>
  <path d="M 400 600 Q 410 500 430 430 Q 450 380 460 300 Q 470 250 480 200" stroke="#8B7355" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="10 8"/>
  <!-- Traditional compound houses -->
  <rect x="480" y="330" width="100" height="80" fill="#d4a574" rx="3"/>
  <polygon points="480,330 530,285 580,330" fill="#c4845a"/>
  <rect x="495" y="360" width="20" height="50" fill="#8B5E3C"/>
  <!-- Second house -->
  <rect x="200" y="345" width="90" height="75" fill="#d4a574" rx="3"/>
  <polygon points="200,345 245,305 290,345" fill="#c4845a"/>
  <rect x="218" y="372" width="18" height="48" fill="#8B5E3C"/>
  <!-- Tall palm trees -->
  <line x1="150" y1="500" x2="158" y2="300" stroke="#5c3a1e" stroke-width="10"/>
  <ellipse cx="158" cy="300" rx="45" ry="30" fill="#2d7a1a" opacity="0.85"/>
  <ellipse cx="145" cy="315" rx="35" ry="18" fill="#1e6a10" opacity="0.8"/>
  <ellipse cx="170" cy="318" rx="35" ry="18" fill="#2d7a1a" opacity="0.8"/>
  <line x1="620" y1="500" x2="628" y2="290" stroke="#5c3a1e" stroke-width="10"/>
  <ellipse cx="628" cy="290" rx="45" ry="30" fill="#2d7a1a" opacity="0.85"/>
  <ellipse cx="615" cy="305" rx="35" ry="18" fill="#1e6a10" opacity="0.8"/>
  <ellipse cx="640" cy="308" rx="35" ry="18" fill="#2d7a1a" opacity="0.8"/>
  <!-- Small palm -->
  <line x1="380" y1="460" x2="385" y2="360" stroke="#5c3a1e" stroke-width="7"/>
  <ellipse cx="385" cy="360" rx="32" ry="20" fill="#2d7a1a" opacity="0.85"/>
  <!-- Gold geometric border pattern -->
  <rect x="0" y="0" width="800" height="12" fill="#C9A227" opacity="0.6"/>
  <rect x="0" y="588" width="800" height="12" fill="#C9A227" opacity="0.6"/>
  <!-- Caption -->
  <rect x="0" y="520" width="800" height="68" fill="#0B3D91" opacity="0.8"/>
  <text x="400" y="553" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">The Land of Ijebu Igbo</text>
  <text x="400" y="576" font-family="Arial, sans-serif" font-size="15" fill="#C9A227" text-anchor="middle">Ogun State, Nigeria — Our Beloved Homeland</text>
</svg>
