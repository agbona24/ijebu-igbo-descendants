<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="#0B3D91" stroke="#C9A227" stroke-width="4"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Globe lines (meridians/parallels suggesting worldwide reach) -->
  <ellipse cx="100" cy="100" rx="40" ry="55" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="100" cy="100" rx="55" ry="40" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.6"/>
  <line x1="100" y1="45" x2="100" y2="155" stroke="#C9A227" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="100" x2="155" y2="100" stroke="#C9A227" stroke-width="1" opacity="0.5"/>
  <!-- IID text -->
  <text x="100" y="112" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">IID</text>
  <!-- Bottom arc label -->
  <path id="bottomArc" d="M 30 130 A 75 75 0 0 0 170 130" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="9.5" fill="#C9A227" text-anchor="middle" letter-spacing="1.5">
    <textPath href="#bottomArc" startOffset="50%">IJEBU IGBO DESCENDANTS</textPath>
  </text>
  <!-- Top arc label -->
  <path id="topArc" d="M 30 85 A 75 75 0 0 1 170 85" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="8.5" fill="#C9A227" text-anchor="middle" letter-spacing="1.2">
    <textPath href="#topArc" startOffset="50%">IN DIASPORA • EST. 2014 •</textPath>
  </text>
</svg>
